<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refunds — ForgeVault Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0b1220" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body class="min-h-screen bg-slate-100">
    <header data-admin-shell class="bg-navy-900"></header>

    <main class="container-page py-10">
      <div class="flex flex-wrap items-end justify-between gap-4">
        <div>
          <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Refunds</h1>
          <p class="mt-1 text-sm text-slate-500">Approving a refund moves real money. It cannot be undone.</p>
        </div>

        <div>
          <label for="refund-status" class="sr-only">Filter by status</label>
          <select id="refund-status" data-refund-filter class="field-input w-56">
            <option value="requested">Awaiting review</option>
            <option value="all">All</option>
            <option value="processing">Processing</option>
            <option value="succeeded">Refunded</option>
            <option value="rejected">Rejected</option>
            <option value="failed">Failed</option>
          </select>
        </div>
      </div>

      <div data-refunds class="mt-8"></div>
    </main>

    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
